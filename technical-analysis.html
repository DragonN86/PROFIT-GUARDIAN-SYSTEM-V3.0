<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Technical Analysis - Spot Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { background: #0a0c12; color: #e0e7ff; font-family: 'Inter', sans-serif; }
        .dashboard-container {
            width: 100%; max-width: 480px; background: #0f172a; border: 1px solid #334155;
            border-radius: 28px; padding: 20px; box-shadow: 0 25px 70px rgba(0,0,0,0.7);
        }
        .main-value { font-size: 2.1rem; font-weight: 900; letter-spacing: -2px; }
        .bar-bg { height: 7px; background: #1e2937; border-radius: 9999px; overflow: hidden; }
        .bar-fill { height: 100%; transition: all 1s ease; }
        .alert-flash { animation: flash 1.3s infinite; }
        @keyframes flash { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    </style>
</head>
<body class="flex justify-center p-4 min-h-screen">
    <div class="dashboard-container">
        <!-- HEADER -->
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <span class="text-3xl">📊</span>
                <div>
                    <h1 class="font-black text-2xl tracking-tighter">BTC Spot</h1>
                    <p class="text-xs text-slate-400 -mt-1">Technical Analysis</p>
                </div>
            </div>
            <div class="flex bg-slate-800 rounded-2xl p-1">
                <button id="btn-weekly" class="tf-btn active px-5 py-2 text-sm font-bold rounded-xl">W1</button>
                <button id="btn-daily" class="tf-btn px-5 py-2 text-sm font-bold rounded-xl">D1</button>
            </div>
        </div>

        <!-- INDICATORS -->
        <div class="bg-slate-900/70 border border-slate-700 rounded-3xl p-5 mb-6">
            <div class="grid grid-cols-2 gap-6">
                <div>
                    <div class="text-xs uppercase tracking-widest text-slate-400 mb-1">RSI (14)</div>
                    <div id="rsi-val" class="main-value text-white">50.00</div>
                    <span id="rsi-status" class="inline-block mt-2 px-4 py-1 text-xs font-bold rounded-2xl bg-slate-700">NEUTRAL</span>
                </div>
                <div>
                    <div class="text-xs uppercase tracking-widest text-slate-400 mb-1">MACD Histogram</div>
                    <div id="macd-val" class="main-value text-emerald-400">-0.00</div>
                </div>
            </div>

            <div class="mt-8">
                <div class="text-xs uppercase tracking-widest text-slate-400 mb-2">Bollinger Bands (20)</div>
                <div class="flex justify-between text-sm">
                    <div>
                        <span class="text-red-400">Upper</span><br>
                        <span id="bb-upper" class="font-mono text-red-400 text-lg">---</span>
                    </div>
                    <div class="text-right">
                        <span class="text-emerald-400">Lower</span><br>
                        <span id="bb-lower" class="font-mono text-emerald-400 text-lg">---</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- VERDICT -->
        <div id="verdict-box" class="rounded-3xl p-6 border border-emerald-500/30 bg-emerald-950/30">
            <div class="flex items-center gap-3 mb-4">
                <div id="signal-dot" class="w-4 h-4 bg-emerald-500 rounded-full animate-ping"></div>
                <h2 id="strat-text" class="text-2xl font-black tracking-tighter">PHỤC HỒI - NẮM GIỮ</h2>
            </div>
            <p id="verdict-text" class="text-slate-300 leading-relaxed text-[15px]">
                Histogram MACD đang đảo chiều lên. Áp lực bán suy yếu. Tiếp tục nắm giữ vị thế Spot.
            </p>

            <div class="mt-8">
                <div class="flex justify-between text-xs font-semibold text-slate-400 mb-2">
                    <span>ĐỘ TIN CẬY</span>
                    <span id="confidence-val">68%</span>
                </div>
                <div class="bar-bg">
                    <div id="risk-bar" class="bar-fill bg-emerald-500" style="width: 68%"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTF = '1w';

        function calculateRSI(prices, period = 14) {
            if (prices.length < period + 5) return 50; // An toàn hơn
            let gains = 0, losses = 0;
            for (let i = prices.length - period; i < prices.length; i++) {
                const diff = prices[i] - prices[i - 1];
                if (diff > 0) gains += diff;
                else losses -= diff;
            }
            const avgGain = gains / period;
            const avgLoss = losses / period || 0.0001; // Tránh chia 0
            return Math.min(100, Math.max(0, 100 - (100 / (1 + avgGain / avgLoss))));
        }

        function calculateEMA(data, period) {
            const k = 2 / (period + 1);
            let ema = data[0];
            const result = [];
            for (let i = 0; i < data.length; i++) {
                if (i > 0) ema = (data[i] * k) + (ema * (1 - k));
                result.push(ema);
            }
            return result;
        }

        function calculateMACD(prices) {
            if (prices.length < 40) return { current: 0, prev: 0 };
            const ema12 = calculateEMA(prices, 12);
            const ema26 = calculateEMA(prices, 26);
            const macdLine = ema12.map((v, i) => v - ema26[i]);
            const signal = calculateEMA(macdLine, 9);
            
            const current = macdLine[macdLine.length - 1] - signal[signal.length - 1];
            const prev = macdLine[macdLine.length - 2] - signal[signal.length - 2];
            return { current: current, prev: prev };
        }

        function calculateBB(prices, period = 20) {
            if (prices.length < period) return { upper: 0, lower: 0 };
            const slice = prices.slice(-period);
            const sma = slice.reduce((a, b) => a + b, 0) / period;
            const stdDev = Math.sqrt(slice.reduce((a, b) => a + (b - sma) ** 2, 0) / period);
            return {
                upper: sma + 2 * stdDev,
                lower: sma - 2 * stdDev
            };
        }

        function formatPrice(num) {
            return num.toLocaleString('en-US', { maximumFractionDigits: 0 });
        }

        async function updateData() {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=${currentTF}&limit=150`);
                const candles = await res.json();
                const prices = candles.map(c => parseFloat(c[4])).filter(p => p > 0);

                const rsi = calculateRSI(prices);
                const macd = calculateMACD(prices);
                const bb = calculateBB(prices);
                const price = prices[prices.length - 1];

                // Cập nhật giao diện
                document.getElementById('rsi-val').textContent = rsi.toFixed(2);
                const rsiStatus = document.getElementById('rsi-status');
                if (rsi < 35) {
                    rsiStatus.textContent = "OVERSOLD";
                    rsiStatus.className = "inline-block mt-2 px-4 py-1 text-xs font-bold rounded-2xl bg-emerald-900 text-emerald-400";
                } else if (rsi > 70) {
                    rsiStatus.textContent = "OVERBOUGHT";
                    rsiStatus.className = "inline-block mt-2 px-4 py-1 text-xs font-bold rounded-2xl bg-red-900 text-red-400";
                } else {
                    rsiStatus.textContent = "NEUTRAL";
                    rsiStatus.className = "inline-block mt-2 px-4 py-1 text-xs font-bold rounded-2xl bg-slate-700";
                }

                const macdEl = document.getElementById('macd-val');
                macdEl.textContent = macd.current.toFixed(2);
                macdEl.className = `main-value ${macd.current >= 0 ? 'text-emerald-400' : 'text-red-400'}`;

                document.getElementById('bb-upper').textContent = formatPrice(bb.upper);
                document.getElementById('bb-lower').textContent = formatPrice(bb.lower);

                // === CHIẾN LƯỢC (đã tối ưu) ===
                let stratText = "TÍCH LŨY - KIÊN NHẪN";
                let color = "text-slate-300";
                let confidence = 45;
                let verdict = "Thị trường đang sideway. Hãy kiên nhẫn quan sát.";

                if (rsi > 72 || price > bb.upper * 0.985) {
                    stratText = "BÁN / REBALANCE";
                    color = "text-red-400";
                    confidence = 88;
                    verdict = "Vùng quá mua mạnh. Nên chốt lời một phần hoặc rebalance danh mục.";
                } else if (rsi < 36 || price < bb.lower * 1.025) {
                    stratText = "VÙNG GOM DCA";
                    color = "text-emerald-400";
                    confidence = 93;
                    verdict = "Điều kiện rất tốt để tích lũy Spot dài hạn.";
                } else if (macd.current > macd.prev && macd.current < 50) {
                    stratText = "PHỤC HỒI - NẮM GIỮ";
                    color = "text-sky-400";
                    confidence = 72;
                    verdict = "Histogram MACD đang đảo chiều lên. Áp lực bán suy yếu. Nên tiếp tục nắm giữ.";
                }

                document.getElementById('strat-text').textContent = stratText;
                document.getElementById('strat-text').className = `text-2xl font-black tracking-tighter ${color} ${confidence > 80 ? 'alert-flash' : ''}`;
                document.getElementById('verdict-text').innerHTML = verdict;

                const bar = document.getElementById('risk-bar');
                bar.style.width = confidence + "%";
                bar.style.background = confidence > 80 ? "#10b981" : confidence > 60 ? "#38bdf8" : "#64748b";

                document.getElementById('confidence-val').textContent = confidence + "%";

            } catch (e) {
                console.error(e);
            }
        }

        // Timeframe buttons
        document.getElementById('btn-weekly').onclick = () => { currentTF = '1w'; updateData(); };
        document.getElementById('btn-daily').onclick = () => { currentTF = '1d'; updateData(); };

        setInterval(updateData, 25000);
        updateData();
    </script>
</body>
</html>
