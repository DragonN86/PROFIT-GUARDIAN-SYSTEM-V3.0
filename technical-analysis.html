<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Technical Analysis - Spot Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #0b0e14; color: #c9d1d9; font-family: 'Inter', sans-serif; }
        .dashboard-container {
            width: 100%; max-width: 480px; background: #0d1117; border: 1px solid #30363d;
            border-radius: 24px; padding: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .indicator-box, .verdict-box { border-radius: 16px; padding: 16px; }
        .main-value { font-family: ui-monospace, monospace; font-weight: 900; font-size: 2rem; }
        .badge { padding: 4px 12px; border-radius: 9999px; font-size: 10px; font-weight: 900; }
        .bar-bg { height: 8px; background: #161b22; border-radius: 9999px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 1.2s ease; }
        .alert-flash { animation: flash 1.2s infinite; }
        @keyframes flash { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="flex justify-center p-4">
    <div class="dashboard-container">
        <!-- HEADER -->
        <div class="flex justify-between items-center mb-6 border-b border-gray-800 pb-4">
            <div class="flex items-center gap-3">
                <span class="text-2xl">📈</span>
                <h1 class="font-black text-lg tracking-tighter">BTC Spot Analysis</h1>
            </div>
            <div class="flex gap-2">
                <button id="btn-weekly" class="tf-btn active px-4 py-1 text-xs font-bold rounded-xl">W1</button>
                <button id="btn-daily" class="tf-btn px-4 py-1 text-xs font-bold rounded-xl">D1</button>
            </div>
        </div>

        <!-- INDICATORS -->
        <div class="indicator-box bg-gray-950/50 border border-gray-800 mb-5">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <div class="text-xs text-gray-500 font-bold uppercase">RSI</div>
                    <div class="flex justify-between items-end">
                        <span id="rsi-val" class="main-value text-white">--.--</span>
                        <span id="rsi-status" class="badge">NEUTRAL</span>
                    </div>
                </div>
                <div>
                    <div class="text-xs text-gray-500 font-bold uppercase">MACD Hist</div>
                    <span id="macd-val" class="text-lg font-mono font-bold">--.--</span>
                </div>
            </div>

            <div class="mt-6">
                <div class="flex justify-between text-xs text-gray-500 font-bold mb-1">
                    <span>Bollinger Bands</span>
                </div>
                <div class="flex justify-between text-sm font-mono">
                    <span class="text-red-400">Upper: <span id="bb-upper">--</span></span>
                    <span class="text-green-400">Lower: <span id="bb-lower">--</span></span>
                </div>
            </div>
        </div>

        <!-- VERDICT -->
        <div id="verdict-box" class="verdict-box border border-green-700 bg-green-950/20">
            <div class="flex items-center gap-2 mb-3">
                <span id="signal-dot" class="w-3 h-3 bg-green-500 rounded-full animate-ping"></span>
                <h2 id="strat-text" class="text-xl font-black uppercase tracking-tighter">Đang phân tích...</h2>
            </div>
            <p id="verdict-text" class="text-sm leading-relaxed text-gray-300"></p>

            <div class="mt-6">
                <div class="flex justify-between text-xs font-bold text-gray-400 mb-2">
                    <span>Độ tin cậy</span>
                    <span id="confidence-val">0%</span>
                </div>
                <div class="bar-bg">
                    <div id="risk-bar" class="bar-fill bg-green-500"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTF = '1w';

        // ==================== CÁC HÀM TÍNH CHUẨN ====================
        function calculateRSI(prices, period = 14) {
            if (prices.length < period + 1) return 50;
            let gains = 0, losses = 0;
            for (let i = 1; i <= period; i++) {
                const diff = prices[prices.length - period + i] - prices[prices.length - period + i - 1];
                if (diff > 0) gains += diff;
                else losses -= diff;
            }
            const avgGain = gains / period;
            const avgLoss = losses / period;
            if (avgLoss === 0) return 100;
            const rs = avgGain / avgLoss;
            return 100 - (100 / (1 + rs));
        }

        function calculateMACD(prices) {
            const ema12 = calculateEMA(prices, 12);
            const ema26 = calculateEMA(prices, 26);
            const macdLine = ema12.map((v, i) => v - ema26[i]);
            const signalLine = calculateEMA(macdLine, 9);
            const histogram = macdLine[macdLine.length-1] - signalLine[signalLine.length-1];
            const prevHist = macdLine[macdLine.length-2] - signalLine[signalLine.length-2];
            return { current: histogram, prev: prevHist };
        }

        function calculateEMA(data, period) {
            const k = 2 / (period + 1);
            let ema = data[0];
            const result = [ema];
            for (let i = 1; i < data.length; i++) {
                ema = (data[i] * k) + (ema * (1 - k));
                result.push(ema);
            }
            return result;
        }

        function calculateBB(prices, period = 20, stdMult = 2) {
            const slice = prices.slice(-period);
            const sma = slice.reduce((a,b)=>a+b,0) / period;
            const variance = slice.reduce((a,b) => a + Math.pow(b - sma, 2), 0) / period;
            const stdDev = Math.sqrt(variance);
            return {
                upper: sma + stdMult * stdDev,
                lower: sma - stdMult * stdDev,
                middle: sma
            };
        }

        function getStrategy(rsi, macd, bb, price, tf) {
            const isWeekly = tf === '1w';

            // === CHIẾN LƯỢC BÁN / REBALANCE ===
            if (rsi > 72 || price >= bb.upper * 0.98) {
                return {
                    text: "BÁN / REBALANCE",
                    color: "text-red-400",
                    verdict: `Thị trường đang ở vùng quá mua mạnh. Nên chốt lời một phần hoặc rebalance danh mục. Rủi ro điều chỉnh sâu cao.`,
                    confidence: 85,
                    flash: true
                };
            }

            // === VÙNG GOM DCA ===
            if (rsi < 38 || price <= bb.lower * 1.03) {
                return {
                    text: "VÙNG GOM SPOT (DCA)",
                    color: "text-green-400",
                    verdict: `Điều kiện lý tưởng để mua tích lũy dài hạn. RSI oversold + giá chạm vùng giá trị thấp.`,
                    confidence: 92,
                    flash: true
                };
            }

            // === PHỤC HỒI ===
            if (macd.current > macd.prev && macd.current < 0) {
                return {
                    text: "PHỤC HỒI - NẮM GIỮ",
                    color: "text-blue-400",
                    verdict: `Histogram MACD đang đảo chiều lên. Áp lực bán suy yếu. Tiếp tục nắm giữ vị thế Spot.`,
                    confidence: 68,
                    flash: false
                };
            }

            // === MẶC ĐỊNH ===
            return {
                text: "TÍCH LŨY - KIÊN NHẪN",
                color: "text-gray-400",
                verdict: `Thị trường đang sideway hoặc chưa rõ xu hướng. Quan sát và chờ tín hiệu
