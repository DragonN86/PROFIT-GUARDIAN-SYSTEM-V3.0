<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <style>
    /* 1. Reset & Base Style */
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background-color: #0d1117; /* Màu nền tiệp với Dashboard */
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* 2. Container */
    .container {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 15px;
    }

    /* 3. Image Control */
    img {
      max-width: 100%;
      max-height: 80%; /* Giới hạn để dành chỗ cho ghi chú */
      object-fit: contain;
      filter: drop-shadow(0 0 15px rgba(0,0,0,0.6));
      border-radius: 8px;
    }

    /* 4. Ghi chú thiết kế trực quan */
    .status-note {
      margin-top: 15px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 30px;
      font-size: 11px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #8b949e;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .safe { 
      color: #3fb950; 
      font-weight: 800;
      text-shadow: 0 0 8px rgba(63, 185, 80, 0.4);
    }

    .danger { 
      color: #f85149; 
      font-weight: 800;
      text-shadow: 0 0 8px rgba(248, 81, 73, 0.4);
    }

    .divider {
      width: 1px;
      height: 10px;
      background: #30363d;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://alternative.me/crypto/fear-and-greed-index.png" alt="Fear & Greed Index">
    
    <div class="status-note">
        <span><span class="safe">0-20:</span> MUA</span>
        <div class="divider"></div>
        <span><span class="danger">80-100:</span> THOÁT HÀNG</span>
    </div>
  </div>
</body>
</html>
