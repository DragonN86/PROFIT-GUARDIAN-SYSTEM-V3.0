<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* 1. Xóa bỏ hoàn toàn khoảng trắng và cuộn */
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #0d1117; /* Màu nền tiệp với Dashboard */
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
    }

    /* 2. Khung chứa ảnh */
    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    /* 3. ÉP ẢNH PHẢI NẰM GỌN TRONG KHUNG */
    .gauge-img {
      max-width: 100%;
      max-height: 85%; /* Dành một chút chỗ cho text bên dưới */
      object-fit: contain; /* Quan trọng: Giữ tỷ lệ ảnh không bị bóp méo */
      border-radius: 8px;
      filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
    }

    /* 4. Text hướng dẫn nhỏ gọn bên dưới */
    .status-text {
      color: #8b949e;
      font-size: 11px;
      margin-top: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
    }

    .danger { color: #f85149; font-weight: bold; }
    .safe { color: #3fb950; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://alternative.me/crypto/fear-and-greed-index.png" 
         alt="Fear and Greed Index" 
         class="gauge-img">
    
    <div class="status-text">
        <span class="safe">0-20: Mua</span> | <span class="danger">80-100: Thoát hàng</span>
    </div>
  </div>
</body>
</html>
