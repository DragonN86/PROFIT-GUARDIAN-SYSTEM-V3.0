<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vo Will - Funding Rate & Leverage</title>
  <style>
    html, body { height: 100%; margin: 0; background: #161b22; color: #c9d1d9; font-family: sans-serif; overflow: hidden; }
    .page { height: 100%; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; }
    .chart { flex: 1; border-radius: 8px; overflow: hidden; background: #000; position: relative; }
    .note { margin-top: 10px; font-size: 12px; border-left: 3px solid #f85149; padding-left: 10px; line-height: 1.4; flex-shrink: 0; }
    .note a { color:#58a6ff; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="page">
    <div class="chart">
      <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
        {
          "colorTheme": "dark",
          "dateRange": "12M",
          "showChart": false,
          "locale": "vi_VN",
          "width": "100%",
          "height": "100%",
          "largeChartUrl": "",
          "isTransparent": true,
          "showSymbolLogo": true,
          "showFloatingTooltip": false,
          "tabs": [
            {
              "title": "Crypto Đòn Bẩy",
              "symbols": [
                { "s": "BINANCE:BTCUSDT" },
                { "s": "BINANCE:ETHUSDT" },
                { "s": "BINANCE:SOLUSDT" },
                { "s": "BINANCE:BNBUSDT" },
                { "s": "BINANCE:DOGEUSDT" }
              ]
            }
          ]
        }
        </script>
      </div>
      </div>
    <div class="note">
      <strong>🔥 Tín hiệu đòn bẩy:</strong> <br>
      - Nếu biến động (Chg%) của các đồng trên đồng loạt <b>> 5-10%</b>: Thị trường đang cực kỳ hưng phấn. <br>
      - <a href="https://www.coinglass.com/FundingRate" target="_blank" rel="noreferrer noopener">Click xem Funding Rate chi tiết tại Coinglass</a>
    </div>
  </div>
</body>
</html>
