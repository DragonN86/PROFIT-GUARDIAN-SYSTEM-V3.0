<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinTrack 2026 - BTC D1 Elite v3.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
       
        body {
            background: #0a0a0f;
            font-family: 'Inter', sans-serif;
            color: white;
            -webkit-font-smoothing: antialiased;
        }
        .card {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
        .inner-box {
            background: #1a2333;
            border-radius: 16px;
            padding: 12px 14px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .text-label {
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #64748b;
        }
        .value-mono {
            font-family: 'ui-monospace', monospace;
        }
        #score-bar {
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .sync-pulse { animation: pulse-soft 2s infinite; }
    </style>
</head>
<body class="p-4 md:p-6 min-h-screen flex items-center justify-center">
    <div class="max-w-xl w-full space-y-5">
        <!-- Header -->
        <div class="flex justify-between items-center px-1">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-gradient-to-br from-cyan-400 to-blue-600 rounded-2xl flex items-center justify-center text-2xl shadow-lg shadow-blue-900/20">📈</div>
                <div>
                    <h1 class="text-2xl font-black tracking-tighter uppercase leading-none">BTC SPOT <span class="text-cyan-400">D1 ELITE</span></h1>
                    <p id="last-updated" class="text-[10px] text-slate-500 font-bold mt-1 uppercase tracking-widest sync-pulse">Đang đồng bộ dữ liệu...</p>
                </div>
            </div>
            <div class="text-right">
                <div id="current-price" class="text-4xl font-black text-emerald-400 value-mono leading-none">---,---</div>
                <div class="text-[10px] text-emerald-500 font-black mt-1 tracking-widest uppercase">Binance Realtime</div>
            </div>
        </div>

        <!-- On-Chain & Regime -->
        <div class="card p-5">
            <h3 class="text-label text-purple-400 mb-4">On-Chain & Market Regime</h3>
            <div class="grid grid-cols-3 gap-3">
                <div class="inner-box text-center">
                    <p class="text-label">MVRV Z-Score</p>
                    <p id="mvrv" class="text-2xl font-black mt-1">0.92</p>
                </div>
                <div class="inner-box text-center">
                    <p class="text-label">Puell Multiple</p>
                    <p id="puell" class="text-2xl font-black mt-1">0.78</p>
                </div>
                <div id="regime-card" class="inner-box text-center bg-amber-500/10 border border-amber-400/20">
                    <p class="text-label text-amber-500">Regime</p>
                    <p id="regime" class="text-xs font-black text-amber-500 mt-2 uppercase">ACCUMULATION</p>
                </div>
            </div>
        </div>

        <!-- Market Metrics -->
        <div class="card p-5">
            <h3 class="text-label text-amber-400 mb-4">Market Metrics & Signals</h3>
            <div id="metrics-grid" class="grid grid-cols-2 md:grid-cols-4 gap-3 text-[11px] font-bold"></div>
            
            <div class="grid grid-cols-3 gap-3 mt-5">
                <div class="inner-box text-center">
                    <p class="text-label text-pink-400">Fear & Greed</p>
                    <p id="fear-greed" class="text-3xl font-black mt-1">--</p>
                    <p id="fear-label" class="text-[10px] font-bold uppercase text-slate-500"></p>
                </div>
                <div class="inner-box text-center">
                    <p class="text-label text-sky-400">Backtest Win</p>
                    <p id="backtest-rate" class="text-3xl font-black text-emerald-400 mt-1">--%</p>
                    <p class="text-[10px] text-slate-500 font-bold uppercase">365 Ngày</p>
                </div>
                <div id="whale-card" class="inner-box text-center flex flex-col justify-center"></div>
            </div>
        </div>

        <!-- DCA Zones -->
        <div class="card p-5">
            <h3 class="text-label text-emerald-400 mb-4">Vùng DCA Lý Tưởng</h3>
            <div id="dca-zones" class="grid grid-cols-3 gap-3"></div>
        </div>

        <!-- Verdict -->
        <div id="verdict-card" class="card p-6 border-l-8 transition-all duration-500">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <div id="signal-dot" class="w-10 h-10 rounded-xl flex items-center justify-center text-2xl bg-black/20"></div>
                    <h2 id="strat-text" class="text-xl font-black uppercase tracking-tighter">Đang phân tích...</h2>
                </div>
                <div class="text-right">
                    <span class="text-label block">DCA Score</span>
                    <span id="score-number" class="text-4xl font-black value-mono leading-none">--</span>
                </div>
            </div>
            <p id="verdict-text" class="text-slate-400 text-sm leading-relaxed font-medium mb-5 italic"></p>
           
            <div class="h-2 bg-slate-800 rounded-full overflow-hidden">
                <div id="score-bar" class="h-full rounded-full transition-all duration-1000 ease-out"></div>
            </div>
        </div>
    </div>

    <script>
        // ==================== UTILITIES ====================
        const $ = id => document.getElementById(id);

        // ==================== TECHNICAL INDICATORS ====================
        function calculateEMA(prices, period) {
            if (prices.length < period) return prices[prices.length - 1];
            let ema = prices.slice(0, period).reduce((a, b) => a + b, 0) / period;
            const k = 2 / (period + 1);
            for (let i = period; i < prices.length; i++) {
                ema = prices[i] * k + ema * (1 - k);
            }
            return ema;
        }

        function calculateRSI(prices, period = 14) {
            if (prices.length < period + 1) return 50;
            
            let gains = 0, losses = 0;
            for (let i = 1; i <= period; i++) {
                const change = prices[i] - prices[i - 1];
                if (change > 0) gains += change;
                else losses -= change;
            }
            
            let avgGain = gains / period;
            let avgLoss = losses / period;
            
            for (let i = period + 1; i < prices.length; i++) {
                const change = prices[i] - prices[i - 1];
                avgGain = (avgGain * (period - 1) + Math.max(change, 0)) / period;
                avgLoss = (avgLoss * (period - 1) + Math.max(-change, 0)) / period;
            }
            
            if (avgLoss === 0) return 100;
            const rs = avgGain / avgLoss;
            return Math.round(100 - (100 / (1 + rs)));
        }

        function runBacktest(closes) {
            let total = 0, wins = 0;
            const limit = Math.min(200, closes.length - 30); // Tối ưu performance
            for (let i = 100; i < closes.length - 30; i += 5) { // Bước nhảy để nhanh hơn
                const slice = closes.slice(0, i + 1);
                const rsi = calculateRSI(slice);
                const ema = calculateEMA(slice, 200);
                
                if (rsi < 45 && slice[i] < ema * 1.05) {
                    total++;
                    if (closes[i + 30] > closes[i] * 1.07) wins++;
                }
            }
            return total > 0 ? Math.round((wins / total) * 100) : 75;
        }

        // ==================== API HELPERS ====================
        async function getFearGreed() {
            try {
                const res = await fetch('https://api.alternative.me/fng/?limit=1');
                const data = await res.json();
                const value = parseInt(data.data[0].value);
                return { 
                    value, 
                    label: data.data[0].value_classification 
                };
            } catch (e) {
                return { value: 50, label: "Neutral" };
            }
        }

        async function getOnChainMetrics() {
            // TODO: Thay bằng API thật (Glassnode, CryptoQuant...) sau
            return {
                mvrv: (Math.random() * 1.8 + 0.4).toFixed(2),
                puell: (Math.random() * 1.3 + 0.3).toFixed(2),
                regime: Math.random() > 0.5 ? "ACCUMULATION" : "DISTRIBUTION"
            };
        }

        // ==================== RENDER FUNCTIONS ====================
        function renderMetrics(isUptrend, rsi, volExhaust) {
            $('metrics-grid').innerHTML = `
                <div class="inner-box flex justify-between"><span>Trend</span><span class="${isUptrend ? 'text-emerald-400' : 'text-red-400'}">● ${isUptrend ? 'UP' : 'DOWN'}</span></div>
                <div class="inner-box flex justify-between"><span>RSI</span><span class="text-sky-400">${rsi}</span></div>
                <div class="inner-box flex justify-between"><span>Vol</span><span class="${volExhaust ? 'text-emerald-400' : 'text-slate-400'}">${volExhaust ? 'LOW' : 'NORM'}</span></div>
                <div class="inner-box flex justify-between"><span>BTC.D</span><span class="text-purple-400">54%</span></div>
            `;
        }

        function renderDCAZones(ema200) {
            const z1 = Math.round(ema200 * 0.93);
            const z2 = Math.round(ema200 * 0.97);
            const z3 = Math.round(ema200 * 1.015);
            
            $('dca-zones').innerHTML = `
                <div class="inner-box text-center">
                    <p class="text-[9px] text-slate-500 font-bold uppercase mb-1">Mức 1 (Deep)</p>
                    <p class="text-lg font-black text-emerald-400">$${z1.toLocaleString()}</p>
                </div>
                <div class="inner-box text-center">
                    <p class="text-[9px] text-slate-500 font-bold uppercase mb-1">Mức 2 (Mid)</p>
                    <p class="text-lg font-black text-emerald-400">$${z2.toLocaleString()}</p>
                </div>
                <div class="inner-box text-center">
                    <p class="text-[9px] text-slate-500 font-bold uppercase mb-1">Mức 3 (Trend)</p>
                    <p class="text-lg font-black text-emerald-400">$${z3.toLocaleString()}</p>
                </div>
            `;
        }

        function updateWhaleCard(whaleSpike) {
            const box = $('whale-card');
            if (whaleSpike) {
                box.className = `inner-box text-center flex flex-col justify-center border border-orange-500/30 bg-orange-500/5`;
                box.innerHTML = `<p class="text-label text-orange-400">🐳 Whale</p>
                                 <p class="text-xs font-black text-orange-400 uppercase mt-1">SPIKE DETECTED</p>`;
            } else {
                box.className = `inner-box text-center flex flex-col justify-center border border-slate-700/50`;
                box.innerHTML = `<p class="text-label text-slate-500">🐳 Whale</p>
                                 <p class="text-xs font-black text-slate-500 uppercase mt-1">Normal</p>`;
            }
        }

        function updateVerdict(score) {
            const sNum = $('score-number');
            const sBar = $('score-bar');
            const sCard = $('verdict-card');
            const sText = $('strat-text');
            const vText = $('verdict-text');
            const sDot = $('signal-dot');

            sNum.textContent = score;
            sBar.style.width = score + "%";

            if (score >= 88) {
                sText.textContent = "DCA LỚN - ĐÁY CHU KỲ";
                sText.className = "text-xl font-black uppercase text-emerald-400";
                vText.textContent = "Fear hoảng loạn + Volume cạn kiệt. Backtest cho tỉ lệ thắng cao. Giải ngân mạnh!";
                sCard.style.borderLeftColor = "#10b981";
                sBar.className = "h-full bg-emerald-500";
                sDot.innerHTML = "🚀";
                sDot.className = "w-10 h-10 rounded-xl flex items-center justify-center text-2xl bg-emerald-500/20";
            } else if (score >= 75) {
                sText.textContent = "VÙNG MUA TỐT";
                sText.className = "text-xl font-black uppercase text-cyan-400";
                vText.textContent = "Thị trường đang điều chỉnh lành mạnh. Thích hợp tích lũy thêm 10-15% vốn.";
                sCard.style.borderLeftColor = "#22d3ee";
                sBar.className = "h-full bg-cyan-500";
                sDot.innerHTML = "✅";
                sDot.className = "w-10 h-10 rounded-xl flex items-center justify-center text-2xl bg-cyan-500/20";
            } else if (score >= 55) {
                sText.textContent = "QUAN SÁT - CHỜ DIP";
                sText.className = "text-xl font-black uppercase text-amber-400";
                vText.textContent = "Giá chưa đạt mức chiết khấu lý tưởng. Kiên nhẫn đợi các vùng DCA phía dưới.";
                sCard.style.borderLeftColor = "#f59e0b";
                sBar.className = "h-full bg-amber-500";
                sDot.innerHTML = "⏳";
                sDot.className = "w-10 h-10 rounded-xl flex items-center justify-center text-2xl bg-amber-500/20";
            } else {
                sText.textContent = "PHÒNG THỦ - TRÁNH FOMO";
                sText.className = "text-xl font-black uppercase text-red-500";
                vText.textContent = "Chỉ số quá nhiệt hoặc lực mua yếu. Tuyệt đối không mua đuổi lúc này.";
                sCard.style.borderLeftColor = "#ef4444";
                sBar.className = "h-full bg-red-500";
                sDot.innerHTML = "🛡️";
                sDot.className = "w-10 h-10 rounded-xl flex items-center justify-center text-2xl bg-red-500/20";
            }
        }

        // ==================== MAIN UPDATE ====================
        async function updateDashboard() {
            const statusEl = $('last-updated');
            statusEl.textContent = "Đang đồng bộ...";

            try {
                const res = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=365');
                const klines = await res.json();
                
                const closes = klines.map(d => parseFloat(d[4]));
                const volumes = klines.map(d => parseFloat(d[5]));
                const price = closes[closes.length - 1];

                const ema200 = calculateEMA(closes, 200);
                const rsi = calculateRSI(closes);
                const volMA20 = volumes.slice(-20).reduce((a, b) => a + b, 0) / 20;
                const currentVol = volumes[volumes.length - 1];

                const isUptrend = price > ema200 * 0.98;
                const volExhaust = currentVol < volMA20 * 0.8;
                const whaleSpike = currentVol > volMA20 * 2.2;

                const fg = await getFearGreed();
                const onchain = await getOnChainMetrics();
                const winRate = runBacktest(closes);

                // Render
                $('current-price').textContent = price.toLocaleString('en-US');
                
                renderMetrics(isUptrend, rsi, volExhaust);
                updateWhaleCard(whaleSpike);
                renderDCAZones(ema200);

                // On-chain
                $('mvrv').textContent = onchain.mvrv;
                $('puell').textContent = onchain.puell;
                $('regime').textContent = onchain.regime;

                // Fear & Greed + Backtest
                $('fear-greed').textContent = fg.value;
                $('fear-greed').className = `text-3xl font-black mt-1 ${fg.value < 35 ? 'text-red-400' : 'text-emerald-400'}`;
                $('fear-label').textContent = fg.label;
                $('backtest-rate').textContent = winRate + "%";

                // Score Logic
                let score = 45;
                if (isUptrend) score += 15;
                if (rsi < 40) score += 25; 
                else if (rsi < 50) score += 12;
                if (volExhaust) score += 15;
                if (fg.value < 30) score += 15;
                if (rsi > 72) score -= 25;

                score = Math.max(20, Math.min(98, Math.round(score)));
                updateVerdict(score);

                // Update time
                statusEl.textContent = `Live • ${new Date().toLocaleTimeString('vi-VN')} • v3.3 Elite`;

            } catch (err) {
                console.error(err);
                statusEl.textContent = "❌ Lỗi kết nối API";
            }
        }

        // ==================== INIT ====================
        updateDashboard();
        setInterval(updateDashboard, 60000); // Cập nhật mỗi 60 giây
    </script>
</body>
</html>
