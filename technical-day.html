<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC WinTrack 2026 - Realtime System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background: #030712; font-family: 'Inter', sans-serif; color: white; }
        .wintrack-card { background: #111827; border: 1px solid #1f2937; border-radius: 20px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .hover-lift:hover { transform: translateY(-5px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5); }
        .signal-dot { animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite; }
        @keyframes ping { 75%, 100% { transform: scale(2.5); opacity: 0; } }
    </style>
</head>
<body class="p-4 md:p-10 bg-[#030712]">
    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-end justify-between mb-10 gap-6">
            <div class="flex items-center gap-5">
                <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center text-3xl shadow-lg shadow-blue-900/20">📊</div>
                <div>
                    <h1 class="text-white font-black text-4xl tracking-tighter uppercase">BTC SPOT <span class="text-blue-500">D1</span></h1>
                    <p id="last-updated" class="text-slate-500 text-xs font-mono uppercase tracking-[0.2em] mt-1 italic font-semibold">Đang đồng bộ...</p>
                </div>
            </div>
            <div class="bg-slate-900/80 p-5 rounded-2xl border border-slate-800 backdrop-blur-md min-w-[260px] shadow-xl">
                <p class="text-slate-500 text-[10px] uppercase font-bold mb-1 tracking-widest">Giá Realtime • BINANCE</p>
                <div id="current-price" class="font-mono text-5xl font-bold text-emerald-400 tracking-tighter">---,---</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <!-- On-chain -->
            <div class="wintrack-card p-7 border-t border-t-purple-500/30">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-purple-400 font-bold text-xs tracking-widest uppercase">Định giá On-chain</h3>
                    <div id="onchain-status" class="text-[10px] px-3 py-1 rounded-full bg-amber-500/20 text-amber-400 font-black uppercase tracking-wider">TECHNICAL ONLY</div>
                </div>
                <div class="grid grid-cols-2 gap-6" id="onchain-grid"></div>
            </div>

            <!-- Price Action -->
            <div class="wintrack-card p-7 border-t border-t-amber-500/30">
                <h3 class="text-amber-400 font-bold text-xs tracking-widest uppercase mb-6">Cấu trúc thị trường (D1)</h3>
                <div id="price-action-text" class="text-2xl font-black text-slate-100 mb-4 tracking-tight"></div>
                <div id="breaker-block" class="bg-black/40 p-4 rounded-xl border border-slate-800 text-slate-300 font-medium flex justify-between items-center"></div>
            </div>
        </div>

        <!-- Verdict -->
        <div id="verdict-card" class="wintrack-card p-10 border-l-[12px] bg-gradient-to-br from-[#111827] to-[#0b0f1a]">
            <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-10">
                <div class="flex-1">
                    <div class="flex items-center gap-4 mb-6">
                        <div id="signal-dot" class="w-5 h-5 rounded-full bg-slate-600"></div>
                        <h2 id="strat-text" class="text-3xl font-black tracking-tighter uppercase text-slate-500">Đang tổng hợp...</h2>
                    </div>
                    <p id="verdict-text" class="text-slate-400 leading-relaxed text-xl italic font-medium"></p>
                </div>
                
                <div class="w-full lg:w-80 p-6 bg-black/20 rounded-3xl border border-white/5 shadow-inner">
                    <div class="flex justify-between items-baseline mb-4">
                        <span class="text-[11px] font-black text-slate-500 tracking-widest uppercase">DCA Trust Score</span>
                        <span id="score-number" class="font-mono text-5xl font-bold text-slate-600 tracking-tighter">--</span>
                    </div>
                    <div class="h-5 bg-black/60 rounded-full overflow-hidden p-1.5 shadow-2xl border border-slate-800">
                        <div id="score-bar" class="h-full bg-slate-700 rounded-full transition-all duration-1000" style="width: 0%"></div>
                    </div>
                    <div class="flex justify-between mt-4 text-[9px]">
                        <span id="score-context" class="text-slate-500 uppercase font-black tracking-widest"></span>
                        <span class="text-slate-600 font-mono">WINTRACK v2.6</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === TÍNH TOÁN CHÍNH XÁC ===
        function calculateEMA(prices, period) {
            if (prices.length < period) return prices[prices.length - 1];
            let ema = prices.slice(0, period).reduce((a, b) => a + b, 0) / period;
            const k = 2 / (period + 1);
            for (let i = period; i < prices.length; i++) {
                ema = (prices[i] * k) + (ema * (1 - k));
            }
            return ema;
        }

        function calculateRSI(prices, period = 14) {
            if (prices.length < period + 1) return 50;
            const changes = prices.slice(1).map((p, i) => p - prices[i]);
            let avgGain = 0, avgLoss = 0;
            for (let i = 0; i < period; i++) {
                if (changes[i] > 0) avgGain += changes[i];
                else avgLoss -= changes[i];
            }
            avgGain /= period; avgLoss /= period;
            for (let i = period; i < changes.length; i++) {
                const gain = changes[i] > 0 ? changes[i] : 0;
                const loss = changes[i] < 0 ? -changes[i] : 0;
                avgGain = (avgGain * (period - 1) + gain) / period;
                avgLoss = (avgLoss * (period - 1) + loss) / period;
            }
            return avgLoss === 0 ? 100 : Math.min(100, Math.max(0, 100 - (100 / (1 + avgGain / avgLoss))));
        }

        async function updateData() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=300');
                const data = await res.json();
                const closes = data.map(c => parseFloat(c[4]));
                const price = closes[closes.length - 1];
                const ema200 = calculateEMA(closes, 200);
                const rsi = calculateRSI(closes);

                document.getElementById('current-price').textContent = price.toLocaleString('en-US');

                // On-chain Fallback
                const ocStatus = document.getElementById('onchain-status');
                ocStatus.textContent = "TECHNICAL ONLY";
                ocStatus.className = "text-[10px] px-3 py-1 rounded-full bg-amber-500/20 text-amber-400 font-black uppercase tracking-wider";
                document.getElementById('onchain-grid').innerHTML = `
                    <div><p class="text-slate-400 text-xs">MVRV Z-Score</p><p class="text-3xl font-bold text-emerald-400">0.80</p></div>
                    <div><p class="text-slate-400 text-xs">Puell Multiple</p><p class="text-3xl font-bold text-emerald-400">0.78</p></div>
                `;

                // Price Action
                document.getElementById('price-action-text').textContent = price > ema200 ? "📈 Cấu trúc tăng dài hạn" : "📉 Cấu trúc điều chỉnh";
                const support = Math.round(ema200 * 0.965);
                document.getElementById('breaker-block').innerHTML = `
                    <span>Vùng hỗ trợ (DCA Zone):</span>
                    <span class="text-emerald-400 font-mono font-bold tracking-wider">$${support.toLocaleString()}</span>
                `;

                // Score
                let score = 58;
                if (rsi < 45) score += 15;
                if (rsi < 35) score += 12;
                if (price <= ema200 * 1.06) score += 18;
                const finalScore = Math.min(100, Math.round(score + 15)); // On-chain rẻ

                // Render Score & Verdict
                document.getElementById('score-number').textContent = finalScore;
                document.getElementById('score-bar').style.width = finalScore + "%";
                document.getElementById('score-context').textContent = "Tech + On-chain Fallback";

                const strat = document.getElementById('strat-text');
                const verdict = document.getElementById('verdict-text');
                const dot = document.getElementById('signal-dot');
                const card = document.getElementById('verdict-card');

                if (finalScore >= 90) {
                    strat.textContent = "🔥 VÙNG ĐÁY MẠNH - DCA LỚN";
                    strat.className = "text-3xl font-black text-emerald-400 tracking-tighter uppercase";
                    verdict.textContent = "Sự hội tụ hiếm gặp. Cơ hội vàng để DCA lớn 15-25% vốn ngay lúc này.";
                    dot.className = "w-5 h-5 rounded-full bg-emerald-500 signal-dot";
                    card.style.borderLeftColor = "#10b981";
                } else if (finalScore >= 82) {
                    strat.textContent = "✅ VÙNG MUA TỐT - DCA";
                    strat.className = "text-3xl font-black text-cyan-400 tracking-tighter uppercase";
                    verdict.textContent = "Thị trường đang rẻ. Phù hợp DCA dần 8-15% vốn.";
                    dot.className = "w-5 h-5 rounded-full bg-cyan-400 signal-dot";
                    card.style.borderLeftColor = "#22d3ee";
                } else if (finalScore >= 70) {
                    strat.textContent = "⏳ QUAN SÁT - CHỜ DIP";
                    strat.className = "text-3xl font-black text-sky-400 tracking-tighter uppercase";
                    verdict.textContent = "Chưa đủ hấp dẫn để vào lớn. Nên chờ dip sâu hơn.";
                    dot.className = "w-5 h-5 rounded-full bg-sky-400";
                    card.style.borderLeftColor = "#38bdf8";
                } else {
                    strat.textContent = "⚠️ CẢNH BÁO - TRÁNH";
                    strat.className = "text-3xl font-black text-red-400 tracking-tighter uppercase";
                    verdict.textContent = "Rủi ro cao. Không nên vào mới lúc này.";
                    dot.className = "w-5 h-5 rounded-full bg-red-400";
                    card.style.borderLeftColor = "#ef4444";
                }

                document.getElementById('last-updated').textContent = `Đồng bộ: ${new Date().toLocaleTimeString('vi-VN')}`;
            } catch (e) {
                console.error(e);
            }
        }

        updateData();
        setInterval(updateData, 60000);
    </script>
</body>
</html>
