<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinTrack 2026 - Mobile Optimized</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background: #030712; font-family: 'Inter', sans-serif; color: white; }
        .wintrack-card { background: #111827; border: 1px solid #1f2937; border-radius: 20px; transition: all 0.3s ease; }
        .hover-lift:hover { transform: translateY(-3px); box-shadow: 0 15px 30px -10px rgb(0 0 0 / 0.5); }
        .signal-dot { animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite; }
        @keyframes ping { 75%, 100% { transform: scale(2); opacity: 0; } }
        /* Giúp thanh cuộn mượt hơn trên mobile */
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="p-3 md:p-10 bg-[#030712] antialiased">
    <div class="max-w-5xl mx-auto">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4 px-1">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-2xl shadow-lg">📊</div>
                <div>
                    <h1 class="text-white font-black text-2xl md:text-3xl tracking-tighter uppercase italic">BTC SPOT <span class="text-blue-500">D1</span></h1>
                    <p id="last-updated" class="text-slate-500 text-[10px] font-mono uppercase tracking-widest mt-0.5">Syncing...</p>
                </div>
            </div>
            <div class="bg-slate-900/60 p-4 rounded-2xl border border-slate-800 backdrop-blur-md shadow-xl flex flex-col justify-center">
                <p class="text-slate-500 text-[9px] uppercase font-bold mb-1 tracking-widest">Live Price • Binance</p>
                <div id="current-price" class="font-mono text-3xl md:text-4xl font-bold text-emerald-400 tracking-tighter leading-none">---,---</div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="wintrack-card p-5 border-t border-t-purple-500/20">
                <div class="flex justify-between items-center mb-5">
                    <h3 class="text-purple-400 font-bold text-[10px] tracking-widest uppercase">On-chain Valuation</h3>
                    <div id="onchain-status" class="text-[9px] px-2 py-0.5 rounded-full bg-amber-500/10 text-amber-500 font-black uppercase tracking-tighter border border-amber-500/20">Checking...</div>
                </div>
                <div class="grid grid-cols-2 gap-4" id="onchain-grid">
                    </div>
            </div>

            <div class="wintrack-card p-5 border-t border-t-amber-500/20">
                <h3 class="text-amber-400 font-bold text-[10px] tracking-widest uppercase mb-5">Market Structure (D1)</h3>
                <div id="price-action-text" class="text-lg font-black text-slate-100 mb-3 tracking-tight">---</div>
                <div id="breaker-block" class="bg-black/30 p-3 rounded-xl border border-slate-800 text-[11px] text-slate-400 flex justify-between items-center">
                    </div>
            </div>
        </div>

        <div id="verdict-card" class="wintrack-card p-6 md:p-10 border-l-[8px] md:border-l-[12px] bg-gradient-to-br from-[#111827] to-[#0b0f1a] shadow-2xl relative overflow-hidden">
            <div class="flex flex-col gap-6">
                <div class="flex-1">
                    <div class="flex items-center gap-3 mb-3">
                        <div id="signal-dot" class="w-3 h-3 rounded-full bg-slate-600"></div>
                        <h2 id="strat-text" class="text-xl md:text-3xl font-black tracking-tighter uppercase text-slate-500">Analysing...</h2>
                    </div>
                    <p id="verdict-text" class="text-slate-400 leading-snug text-sm md:text-xl italic font-medium"></p>
                </div>
                
                <div class="w-full bg-black/30 p-5 rounded-2xl border border-white/5">
                    <div class="flex justify-between items-end mb-3">
                        <div>
                            <span class="text-[10px] font-black text-slate-500 tracking-widest uppercase block mb-1">Trust Score</span>
                            <span id="score-number" class="font-mono text-5xl font-bold text-slate-600 leading-none tracking-tighter">--</span>
                        </div>
                        <div class="text-right">
                            <span id="score-context" class="text-[9px] text-slate-500 uppercase font-black tracking-widest block">---</span>
                        </div>
                    </div>
                    <div class="h-3 bg-black/50 rounded-full overflow-hidden p-0.5 border border-slate-800">
                        <div id="score-bar" class="h-full bg-slate-700 rounded-full transition-all duration-1000 ease-out" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="text-center mt-8 py-4 opacity-30">
            <p class="text-[9px] font-bold tracking-[0.3em] uppercase">WinTrack 2026 • Discipline is Freedom</p>
        </footer>
    </div>

    <script>
        // === CORE CALCULATIONS ===
        const calculateEMA = (ps, p) => ps.length < p ? ps[ps.length - 1] : ps.slice(p).reduce((e, v) => (v * (2 / (p + 1))) + (e * (1 - (2 / (p + 1)))), ps.slice(0, p).reduce((a, b) => a + b, 0) / p);
        
        function calculateRSI(prices, period = 14) {
            if (prices.length < period + 1) return 50;
            const changes = prices.slice(1).map((p, i) => p - prices[i]);
            let gain = 0, loss = 0;
            for (let i = 0; i < period; i++) changes[i] > 0 ? gain += changes[i] : loss -= changes[i];
            gain /= period; loss /= period;
            for (let i = period; i < changes.length; i++) {
                gain = (gain * (period - 1) + (changes[i] > 0 ? changes[i] : 0)) / period;
                loss = (loss * (period - 1) + (changes[i] < 0 ? -changes[i] : 0)) / period;
            }
            return 100 - (100 / (1 + gain / (loss || 0.0001)));
        }

        async function updateData() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=300');
                const data = await res.json();
                const closes = data.map(c => parseFloat(c[4]));
                const price = closes[closes.length - 1];
                const ema200 = calculateEMA(closes, 200);
                const rsi = calculateRSI(closes);

                document.getElementById('current-price').textContent = price.toLocaleString('en-US');

                // Render On-chain
                document.getElementById('onchain-status').textContent = "TECHNICAL ONLY";
                document.getElementById('onchain-grid').innerHTML = `
                    <div class="bg-black/20 p-3 rounded-xl border border-slate-800"><p class="text-slate-500 text-[9px] uppercase font-bold mb-1">MVRV Z</p><p class="text-xl font-bold text-emerald-400">0.80</p></div>
                    <div class="bg-black/20 p-3 rounded-xl border border-slate-800"><p class="text-slate-500 text-[9px] uppercase font-bold mb-1">Puell</p><p class="text-xl font-bold text-emerald-400">0.78</p></div>
                `;

                // Render Price Action
                document.getElementById('price-action-text').textContent = price > ema200 ? "📈 Uptrend Structure" : "📉 Correction Phase";
                const support = Math.round(ema200 * 0.965);
                document.getElementById('breaker-block').innerHTML = `<span>DCA Zone:</span><span class="text-emerald-400 font-bold">$${support.toLocaleString()}</span>`;

                // Calculation
                let score = 58;
                if (rsi < 45) score += 15;
                if (rsi < 35) score += 12;
                if (price <= ema200 * 1.06) score += 18;
                const finalScore = Math.min(100, Math.round(score + 15));

                // UI Update
                const strat = document.getElementById('strat-text');
                const verdict = document.getElementById('verdict-text');
                const dot = document.getElementById('signal-dot');
                const card = document.getElementById('verdict-card');
                const sBar = document.getElementById('score-bar');
                const sNum = document.getElementById('score-number');

                sNum.textContent = finalScore;
                sBar.style.width = finalScore + "%";
                document.getElementById('score-context').textContent = "Tech + Fallback";

                if (finalScore >= 90) {
                    strat.textContent = "🔥 DCA LỚN - ĐÁY MẠNH";
                    strat.className = "text-xl md:text-3xl font-black text-emerald-400 tracking-tighter uppercase";
                    verdict.textContent = "Cơ hội vàng! Kỹ thuật và định giá đang ở vùng cực rẻ. Giải ngân 15-25% vốn.";
                    dot.className = "w-3 h-3 rounded-full bg-emerald-500 signal-dot";
                    card.style.borderLeftColor = "#10b981";
                    sBar.className = "h-full bg-emerald-500 transition-all duration-1000";
                    sNum.className = "font-mono text-5xl font-bold text-emerald-500 tracking-tighter";
                } else if (finalScore >= 82) {
                    strat.textContent = "✅ VÙNG MUA TỐT - DCA";
                    strat.className = "text-xl md:text-3xl font-black text-cyan-400 tracking-tighter uppercase";
                    verdict.textContent = "Định giá hấp dẫn. Phù hợp để tích lũy dần 8-15% vốn theo kế hoạch.";
                    dot.className = "w-3 h-3 rounded-full bg-cyan-400 signal-dot";
                    card.style.borderLeftColor = "#22d3ee";
                    sBar.className = "h-full bg-cyan-400 transition-all duration-1000";
                    sNum.className = "font-mono text-5xl font-bold text-cyan-400 tracking-tighter";
                } else if (finalScore >= 70) {
                    strat.textContent = "⏳ QUAN SÁT - CHỜ DIP";
                    strat.className = "text-xl md:text-3xl font-black text-sky-400 tracking-tighter uppercase";
                    verdict.textContent = "Giá chưa đạt mức chiết khấu kỳ vọng. Kiên nhẫn chờ dip sâu hơn.";
                    dot.className = "w-3 h-3 rounded-full bg-sky-400";
                    card.style.borderLeftColor = "#38bdf8";
                    sBar.className = "h-full bg-sky-500 transition-all duration-1000";
                    sNum.className = "font-mono text-5xl font-bold text-sky-400 tracking-tighter";
                } else {
                    strat.textContent = "⚠️ CẢNH BÁO - TRÁNH";
                    strat.className = "text-xl md:text-3xl font-black text-red-500 tracking-tighter uppercase";
                    verdict.textContent = "Rủi ro cao hoặc On-chain quá nhiệt. Tuyệt đối không FOMO tại đây.";
                    dot.className = "w-3 h-3 rounded-full bg-red-500";
                    card.style.borderLeftColor = "#ef4444";
                    sBar.className = "h-full bg-red-500 transition-all duration-1000";
                    sNum.className = "font-mono text-5xl font-bold text-red-500 tracking-tighter";
                }

                document.getElementById('last-updated').textContent = `Sync: ${new Date().toLocaleTimeString('vi-VN')}`;
            } catch (e) {
                document.getElementById('last-updated').textContent = "Connection Error";
            }
        }

        updateData();
        setInterval(updateData, 60000);
    </script>
</body>
</html>
