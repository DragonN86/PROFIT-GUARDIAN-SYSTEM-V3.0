<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinTrack 2026 - D1 Elite v2.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background: #030712; font-family: 'Inter', sans-serif; color: white; }
        .wintrack-card { background: #111827; border: 1px solid #1f2937; border-radius: 16px; transition: all 0.3s ease; }
        .hover-lift:hover { transform: translateY(-3px); border-color: #60a5fa; }
        .signal-dot { animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite; }
        @keyframes ping { 75%, 100% { transform: scale(2.5); opacity: 0; } }
        .text-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em; color: #94a3b8; text-transform: uppercase; }
        .value-mono { font-family: 'ui-monospace', monospace; }
    </style>
</head>
<body class="p-4 md:p-6 bg-[#030712]">
    <div class="max-w-2xl mx-auto space-y-5">
        <!-- Header -->
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-blue-600/20 rounded-2xl flex items-center justify-center text-3xl">📊</div>
                <div>
                    <h1 class="text-2xl font-black tracking-tighter uppercase italic">BTC SPOT <span class="text-blue-500">D1 ELITE</span></h1>
                    <p id="last-updated" class="text-xs text-slate-500">Đang đồng bộ...</p>
                </div>
            </div>
            <div class="text-right">
                <div id="current-price" class="text-4xl font-black text-emerald-400 tabular-nums">---,---</div>
                <div class="text-label">Binance • Realtime</div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- On-chain + Dominance -->
            <div class="wintrack-card p-5 hover-lift">
                <h3 class="text-label text-purple-400 mb-4">On-chain & Market Regime</h3>
                <div class="grid grid-cols-2 gap-4" id="onchain-grid"></div>
                <div id="market-regime" class="mt-4 px-4 py-2 rounded-xl text-center font-bold text-sm"></div>
            </div>

            <!-- Technical + Derivatives -->
            <div class="wintrack-card p-5 hover-lift">
                <h3 class="text-label text-amber-400 mb-4">Technical Indicators</h3>
                <div id="indicators-grid" class="grid grid-cols-3 gap-3 text-center"></div>
                
                <div class="mt-5">
                    <h4 class="text-label mb-2">Signal Strength</h4>
                    <div id="signal-strength" class="grid grid-cols-2 gap-2 text-xs"></div>
                </div>
            </div>
        </div>

        <!-- DCA Zones -->
        <div class="wintrack-card p-5 hover-lift">
            <h3 class="text-label text-emerald-400 mb-3">Vùng DCA Lý Tưởng (3 mức)</h3>
            <div id="dca-zones" class="grid grid-cols-3 gap-3"></div>
        </div>

        <!-- Verdict Card -->
        <div id="verdict-card" class="wintrack-card p-6 border-l-8 bg-gradient-to-b from-[#111827] to-[#0f172a]">
            <div class="flex items-center gap-3 mb-3">
                <div id="signal-dot" class="w-4 h-4 rounded-full bg-slate-500"></div>
                <h2 id="strat-text" class="text-xl font-black uppercase tracking-tighter">Đang phân tích...</h2>
            </div>
            <p id="verdict-text" class="text-slate-300 text-[15px] leading-relaxed"></p>

            <div class="mt-6 bg-black/40 p-5 rounded-2xl">
                <div class="flex justify-between items-end mb-2">
                    <div>
                        <span class="text-label">DCA Trust Score</span>
                        <span id="score-number" class="block text-5xl font-black text-slate-400">00</span>
                    </div>
                    <div id="score-context" class="text-right text-xs text-slate-400"></div>
                </div>
                <div class="h-3 bg-slate-800 rounded-full overflow-hidden">
                    <div id="score-bar" class="h-full transition-all duration-1000 rounded-full" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let lastScore = 0;
        let audioContext;

        function playAlert() {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
            oscillator.connect(audioContext.destination);
            oscillator.start();
            setTimeout(() => oscillator.stop(), 180);
        }

        function calculateEMA(prices, period) {
            if (prices.length < period) return prices[prices.length-1];
            let ema = prices.slice(0, period).reduce((a,b)=>a+b,0)/period;
            const k = 2/(period+1);
            for (let i = period; i < prices.length; i++) ema = prices[i]*k + ema*(1-k);
            return ema;
        }

        function calculateRSI(prices, period = 14) {
            if (prices.length < period+1) return 50;
            const changes = prices.slice(1).map((p,i)=>p-prices[i]);
            let gain=0, loss=0;
            for (let i=0; i<period; i++) {
                if (changes[i]>0) gain += changes[i]; else loss -= changes[i];
            }
            gain /= period; loss /= period;
            for (let i=period; i<changes.length; i++) {
                gain = (gain*(period-1) + Math.max(changes[i],0))/period;
                loss = (loss*(period-1) + Math.max(-changes[i],0))/period;
            }
            return 100 - (100 / (1 + gain / (loss || 0.0001)));
        }

        function detectRSIDivergence(prices, rsiValues) {
            if (prices.length < 10) return "neutral";
            const last5Price = prices.slice(-5);
            const last5RSI = rsiValues.slice(-5);
            // Bearish divergence
            if (last5Price[4] > last5Price[3] && last5RSI[4] < last5RSI[3]) return "bearish";
            // Bullish divergence
            if (last5Price[4] < last5Price[3] && last5RSI[4] > last5RSI[3]) return "bullish";
            return "neutral";
        }

        function getMarketRegime(price, ema200, rsi, trend) {
            if (price > ema200 && trend === "up") return rsi > 70 ? "OVERHEATED (Hưng phấn)" : "BULL RUN (Tăng trưởng)";
            if (price < ema200 && trend === "down") return rsi < 30 ? "CAPITULATION (Hoảng loạn)" : "BEAR MARKET (Giá xuống)";
            return "ACCUMULATION (Tích lũy)";
        }

        async function updateData() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=365');
                const data = await res.json();

                const closes = data.map(d => parseFloat(d[4]));
                const highs = data.map(d => parseFloat(d[2]));
                const lows = data.map(d => parseFloat(d[3]));
                const volumes = data.map(d => parseFloat(d[5]));
                const price = closes[closes.length - 1];

                const ema200 = calculateEMA(closes, 200);
                const rsi = calculateRSI(closes);
                const rsiValues = []; // simple RSI history for divergence
                for (let i = 14; i < closes.length; i++) rsiValues.push(calculateRSI(closes.slice(0, i+1)));
                
                const divergence = detectRSIDivergence(closes, rsiValues);

                // Supertrend approx
                const stTrend = price > (highs[highs.length-1] + lows[lows.length-1])/2 ? "up" : "down";

                const bb = { upper: calculateEMA(closes,20) * 1.02, lower: calculateEMA(closes,20) * 0.98 }; // approx

                const volMA20 = volumes.slice(-20).reduce((a,b)=>a+b,0)/20;
                const currentVol = volumes[volumes.length-1];
                const volumeExhaust = currentVol < volMA20 * 0.8;

                // BTC Dominance
                let btcDom = "52.4";
                try {
                    const domRes = await fetch('https://api.coingecko.com/api/v3/global');
                    const domData = await domRes.json();
                    btcDom = domData.data.market_cap_percentage.btc.toFixed(1);
                } catch(e) {}

                // Funding
                const fundRes = await fetch('https://fapi.binance.com/fapi/v1/fundingRate?symbol=BTCUSDT&limit=1');
                const fundData = await fundRes.json();
                const funding = parseFloat(fundData[0]?.fundingRate || 0) * 100;

                document.getElementById('current-price').textContent = price.toLocaleString('en-US');

                // On-chain grid + Dominance
                document.getElementById('onchain-grid').innerHTML = `
                    <div class="bg-black/30 p-4 rounded-xl text-center"><p class="text-label text-purple-400">MVRV Z</p><p class="text-2xl font-black">0.92</p></div>
                    <div class="bg-black/30 p-4 rounded-xl text-center"><p class="text-label text-amber-400">Puell</p><p class="text-2xl font-black">0.78</p></div>
                `;
                document.getElementById('market-regime').innerHTML = `
                    <span class="px-4 py-1 rounded-2xl text-xs font-black ${price > ema200 ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}">
                        ${getMarketRegime(price, ema200, rsi, stTrend)}
                    </span>
                    <span class="ml-3 text-slate-400">BTC.D ${btcDom}%</span>
                `;

                // Signal Strength
                const signalsHTML = `
                    <div class="flex justify-between bg-black/30 p-3 rounded-xl"><span>Supertrend</span><span class="${stTrend==='up'?'text-emerald-400':'text-red-400'} font-bold">● ${stTrend.toUpperCase()}</span></div>
                    <div class="flex justify-between bg-black/30 p-3 rounded-xl"><span>RSI 14</span><span class="${rsi<40?'text-emerald-400':rsi>70?'text-red-400':'text-sky-400'} font-bold">${rsi.toFixed(1)}</span></div>
                    <div class="flex justify-between bg-black/30 p-3 rounded-xl"><span>Divergence</span><span class="${divergence==='bullish'?'text-emerald-400':divergence==='bearish'?'text-red-400':'text-slate-400'} font-bold">${divergence.toUpperCase()}</span></div>
                    <div class="flex justify-between bg-black/30 p-3 rounded-xl"><span>Volume Exhaust</span><span class="${volumeExhaust?'text-emerald-400':'text-slate-400'} font-bold">${volumeExhaust?'YES':'NO'}</span></div>
                `;
                document.getElementById('signal-strength').innerHTML = signalsHTML;

                // DCA Zones
                const zone1 = Math.round(bb.lower);
                const zone2 = Math.round(ema200 * 0.96);
                const zone3 = Math.round(ema200 * 0.92);
                document.getElementById('dca-zones').innerHTML = `
                    <div class="bg-black/30 p-4 rounded-2xl text-center"><p class="text-label">Mức 1</p><p class="text-2xl font-black text-emerald-400">$${zone1.toLocaleString()}</p></div>
                    <div class="bg-black/30 p-4 rounded-2xl text-center"><p class="text-label">Mức 2</p><p class="text-2xl font-black text-emerald-400">$${zone2.toLocaleString()}</p></div>
                    <div class="bg-black/30 p-4 rounded-2xl text-center"><p class="text-label">Mức 3</p><p class="text-2xl font-black text-emerald-400">$${zone3.toLocaleString()}</p></div>
                `;

                // ==================== DCA TRUST SCORE v2.9 (Dynamic) ====================
                let score = 50;

                const trendAgree = (price > ema200 && stTrend === "up");
                const rsiWeight = trendAgree ? 2 : 1;

                if (rsi < 40) score += 22 * rsiWeight;
                else if (rsi < 50) score += 12 * rsiWeight;

                if (trendAgree) score += 25;
                if (volumeExhaust) score += 18;
                if (divergence === "bullish") score += 15;

                if (price > bb.upper * 1.01 || rsi > 75) score -= 22; // Greed Zone

                score = Math.max(20, Math.min(98, Math.round(score)));

                // Render
                const sNum = document.getElementById('score-number');
                const sBar = document.getElementById('score-bar');
                const strat = document.getElementById('strat-text');
                const verdict = document.getElementById('verdict-text');
                const card = document.getElementById('verdict-card');
                const dot = document.getElementById('signal-dot');

                sNum.textContent = score;
                sBar.style.width = score + "%";

                // Sound Alert
                if ((score >= 90 && lastScore < 90) || (score < 40 && lastScore >= 40)) playAlert();
                lastScore = score;

                if (score >= 88) {
                    strat.textContent = "🔥 DCA LỚN - ĐÁY CHU KỲ";
                    strat.className = "text-xl font-black text-emerald-400 uppercase tracking-tighter";
                    verdict.textContent = "Trend đồng thuận + Volume kiệt sức + Divergence bullish. Giải ngân mạnh 15-30% vốn!";
                    card.style.borderLeftColor = "#10b981";
                } else if (score >= 78) {
                    strat.textContent = "✅ VÙNG MUA TỐT";
                    strat.className = "text-xl font-black text-cyan-400 uppercase tracking-tighter";
                    verdict.textContent = "Điều kiện DCA cực kỳ thuận lợi. Tích lũy dần theo kế hoạch.";
                    card.style.borderLeftColor = "#22d3ee";
                } else if (rsi > 75 && price > bb.upper) {
                    strat.textContent = "⚠️ GREED ZONE - CÂN NHẮC CHỐT LỜI";
                    strat.className = "text-xl font-black text-pink-500 uppercase tracking-tighter";
                    verdict.textContent = "Thị trường quá nóng. Không mua thêm, xem xét chốt lời một phần.";
                    card.style.borderLeftColor = "#ec4899";
                } else if (score >= 65) {
                    strat.textContent = "⏳ CHỜ DIP THÊM";
                    strat.className = "text-xl font-black text-sky-400 uppercase tracking-tighter";
                    verdict.textContent = "Vẫn có thể mua nhỏ nhưng chưa phải điểm tối ưu.";
                    card.style.borderLeftColor = "#38bdf8";
                } else {
                    strat.textContent = "⚠️ PHÒNG THỦ - TRÁNH DCA";
                    strat.className = "text-xl font-black text-red-500 uppercase tracking-tighter";
                    verdict.textContent = "Thị trường chưa rẻ hoặc rủi ro cao. Giữ stablecoin chờ tín hiệu rõ ràng hơn.";
                    card.style.borderLeftColor = "#ef4444";
                }

                document.getElementById('last-updated').textContent = `Live • ${new Date().toLocaleTimeString('vi-VN')} • v2.9 Elite`;

            } catch (e) {
                console.error(e);
                document.getElementById('last-updated').textContent = "Lỗi kết nối";
            }
        }

        updateData();
        setInterval(updateData, 90000);
    </script>
</body>
</html>
