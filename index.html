<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vo Will - WinTrack 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .phase-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .phase-card-active {
            border-color: #f2cc60 !important;
            background: rgba(242, 204, 96, 0.1) !important;
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(242, 204, 96, 0.15);
        }
        .phase-card-accumulate {
            border-color: #3fb950 !important;
            background: rgba(63, 185, 80, 0.12) !important;
            transform: translateY(-6px);
        }
        .status-badge-active { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    </style>
</head>
<body class="p-6 lg:p-12 bg-[#0d1117] text-[#c9d1d9]">

    <header class="flex flex-col md:flex-row justify-between items-center mb-10 pb-8 border-b border-[#30363d]">
        <div>
            <h1 class="text-3xl font-black text-white uppercase tracking-tighter">WinTrack <span class="text-[#f2cc60]">2026</span></h1>
            <p class="text-gray-500 text-sm mt-1">
                Chiến lược: <span class="text-[#58a6ff] font-bold italic">KỶ LUẬT LÀ SỨC MẠNH</span> 
                | User: <span class="text-white font-semibold">vowill</span>
            </p>
        </div>
        <div class="mt-4 md:mt-0 px-5 py-2 bg-[#1c2128] rounded-full border border-[#30363d] flex items-center gap-2">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            <span class="text-xs font-mono uppercase tracking-widest">LIVE MARKET DATA ACTIVE</span>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
        <!-- Technical Analysis -->
        <div class="card-container border border-[#30363d] rounded-3xl overflow-hidden bg-[#161b22]">
            <div class="card-header bg-[#1c2128] p-4 border-b border-[#30363d]">
                <span class="font-bold text-sm uppercase">📈 Technical Analysis</span>
            </div>
            <div class="h-[340px]"><iframe id="tech-frame" src="technical-analysis.html" class="w-full h-full border-none"></iframe></div>
        </div>

        <!-- Fear & Greed -->
        <div class="card-container border border-[#30363d] rounded-3xl overflow-hidden bg-[#161b22]">
            <div class="card-header bg-[#1c2128] p-4 border-b border-[#30363d]">
                <span class="font-bold text-sm uppercase">📊 Market Sentiment</span>
            </div>
            <div class="h-[340px]"><iframe src="fear-greed.html" class="w-full h-full border-none"></iframe></div>
        </div>

        <!-- BTC Dominance -->
        <div class="card-container border border-[#30363d] rounded-3xl overflow-hidden bg-[#161b22]">
            <div class="card-header bg-[#1c2128] p-4 border-b border-[#30363d]">
                <span class="font-bold text-sm uppercase">🌍 BTC Dominance</span>
            </div>
            <div class="h-[340px]"><iframe src="https://s.tradingview.com/widgetembed/?symbol=CRYPTOCAP%3ABTC.D&interval=D&theme=dark" class="w-full h-full border-none"></iframe></div>
        </div>

        <!-- Leverage -->
        <div class="card-container border border-[#30363d] rounded-3xl overflow-hidden bg-[#161b22]">
            <div class="card-header bg-[#1c2128] p-4 border-b border-[#30363d]">
                <span class="font-bold text-sm uppercase">🔥 Leverage Signals</span>
            </div>
            <div class="h-[340px]"><iframe src="leverage-signals.html" class="w-full h-full border-none"></iframe></div>
        </div>
    </div>

    <!-- KẾ HOẠCH CHIẾN LƯỢC 4 PHASE -->
    <section class="strategy-section mt-8">
        <div class="flex items-center mb-6">
            <span class="w-1.5 h-8 bg-[#f2cc60] mr-4 rounded"></span>
            <h2 class="text-2xl font-bold uppercase tracking-tight">KẾ HOẠCH HÀNH ĐỘNG & MỤC TIÊU</h2>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5" id="phases-grid">
            <!-- Phases sẽ được JS cập nhật -->
        </div>
    </section>

    <footer class="text-center mt-20 text-[#484f58] text-xs tracking-widest">
        © 2026 CRYPTO EXIT SYSTEM BY VO WILL — KỶ LUẬT LÀ SỨC MẠNH
    </footer>

    <script>
        const phases = [
            { id: 0, title: "Tích lũy (DCA)", desc: "RSI < 32 + Extreme Fear + Giá gần Lower Band", color: "emerald" },
            { id: 1, title: "Chốt 20-30%", desc: "RSI > 55 hoặc Profit > 25%", color: "amber" },
            { id: 2, title: "Chốt 30-50%", desc: "RSI > 70 hoặc Profit > 60% (Target x2-x2.5)", color: "blue" },
            { id: 3, title: "Gồng lãi cuối", desc: "Extreme Greed + Trailing Stop 15-20%", color: "purple" }
        ];

        function createPhases() {
            const container = document.getElementById('phases-grid');
            container.innerHTML = '';
            phases.forEach(p => {
                const div = document.createElement('div');
                div.id = `phase-${p.id}`;
                div.className = `phase-card border border-[#30363d] p-6 rounded-3xl bg-[#1c2128]`;
                div.innerHTML = `
                    <div class="flex justify-between mb-4">
                        <span class="text-xs font-black uppercase text-gray-500">PHASE 0${p.id}</span>
                        <span id="badge-${p.id}" class="status-badge-inactive">WAITING</span>
                    </div>
                    <h3 class="text-lg font-bold text-white">${p.title}</h3>
                    <p class="text-xs text-gray-400 mt-3 leading-relaxed">${p.desc}</p>
                `;
                container.appendChild(div);
            });
        }

        // Đồng bộ với Technical Analysis
        function syncWithTechnical() {
            const frame = document.getElementById('tech-frame');
            try {
                const rsi = parseFloat(frame.contentWindow?.document.getElementById('rsi-val')?.innerText) || 0;
                const fear = 17; // Bạn có thể lấy từ fear-greed.html nếu muốn

                // Reset all
                for (let i = 0; i < 4; i++) {
                    document.getElementById(`phase-${i}`).classList.remove('phase-card-active', 'phase-card-accumulate');
                    document.getElementById(`badge-${i}`).className = "status-badge-inactive";
                    document.getElementById(`badge-${i}`).textContent = "WAITING";
                }

                if (rsi < 32) {
                    activatePhase(0, "ACCUMULATING", "green");
                } else if (rsi > 72) {
                    activatePhase(2, "TAKE PROFIT", "yellow");
                } else if (rsi > 55) {
                    activatePhase(1, "SECURE", "amber");
                }
            } catch(e) {
                console.log("Đang chờ Technical Analysis load...");
            }
        }

        function activatePhase(id, text, type) {
            const card = document.getElementById(`phase-${id}`);
            const badge = document.getElementById(`badge-${id}`);
            
            if (type === "green") card.classList.add('phase-card-accumulate');
            else card.classList.add('phase-card-active');
            
            badge.textContent = text;
            badge.className = type === "green" ? "status-badge-green" : "status-badge-active";
        }

        // Khởi tạo
        createPhases();
        setInterval(syncWithTechnical, 4000);
        setTimeout(syncWithTechnical, 1500);
    </script>
</body>
</html>
