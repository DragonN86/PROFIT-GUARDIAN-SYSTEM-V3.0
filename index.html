<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vo Will - WinTrack 2026 | Crypto Exit System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: #c9d1d9; }
        .phase-card { transition: all 0.5s ease; border: 1px solid #30363d; }
        .phase-card-active { border-color: #f2cc60 !important; background: rgba(242, 204, 96, 0.08) !important; transform: translateY(-5px); }
        .phase-card-accumulate { border-color: #3fb950 !important; background: rgba(63, 185, 80, 0.1) !important; transform: translateY(-5px); }
    </style>
</head>
<body class="min-h-screen p-4 lg:p-8">
    <!-- HEADER -->
    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10 pb-8 border-b border-[#30363d]">
        <div>
            <h1 class="text-5xl font-black text-white uppercase tracking-tighter">WinTrack <span class="text-[#f2cc60]">2026</span></h1>
            <p class="text-gray-400 text-sm mt-2 font-medium">Chiến lược: <span class="text-[#58a6ff]">"KỶ LUẬT LÀ SỨC MẠNH"</span></p>
        </div>
        <div class="mt-6 md:mt-0 flex items-center gap-4 bg-[#161b22] px-6 py-3 rounded-2xl border border-[#30363d]">
            <div class="flex flex-col items-end">
                <span class="text-[10px] text-gray-500 font-bold tracking-widest uppercase">System Status</span>
                <span id="system-status" class="text-xs font-mono text-yellow-400">CONNECTING...</span>
            </div>
            <span id="status-dot" class="w-3 h-3 bg-yellow-500 rounded-full animate-pulse"></span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <!-- IFRAMES -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
            <div class="border border-[#30363d] rounded-3xl overflow-hidden h-[400px] bg-[#161b22]">
                <iframe id="tech-frame" src="technical-analysis.html" class="w-full h-full border-none"></iframe>
            </div>
            <div class="border border-[#30363d] rounded-3xl overflow-hidden h-[400px] bg-[#161b22]">
                <iframe id="fear-frame" src="fear-greed.html" class="w-full h-full border-none"></iframe>
            </div>
            <div class="border border-[#30363d] rounded-3xl overflow-hidden h-[400px] bg-[#161b22]">
                <iframe src="https://s.tradingview.com/widgetembed/?symbol=CRYPTOCAP%3ABTC.D&theme=dark" class="w-full h-full border-none"></iframe>
            </div>
            <div class="border border-[#30363d] rounded-3xl overflow-hidden h-[400px] bg-[#161b22]">
                <iframe src="leverage-signals.html" class="w-full h-full border-none"></iframe>
            </div>
        </div>

        <!-- ACTION PLAN -->
        <section>
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <h2 class="text-3xl font-black text-white uppercase">KẾ HOẠCH HÀNH ĐỘNG</h2>
                <div class="bg-[#1c2128] border border-[#30363d] px-6 py-3 rounded-2xl flex items-center gap-4">
                    <span id="current-phase-text" class="text-sm font-bold text-white uppercase">WAITING...</span>
                    <div class="h-8 w-[1px] bg-[#30363d]"></div>
                    <span id="phase-duration" class="text-sm font-mono text-[#58a6ff]">0 phút</span>
                </div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="phases-grid"></div>
        </section>
    </main>

    <script>
        const STORAGE_KEY = "wintrack_2026_state";
        let currentPhaseId = -1;
        let phaseStartTime = Date.now();
        let marketData = { rsi: null, fear: null };

        const phaseConfig = [
            { id: 0, title: "Tích lũy (GOM DẦN)", status: "ACCUMULATING", color: "text-emerald-400", desc: "RSI < 35 & Fear < 30. Mua mạnh tay." },
            { id: 1, title: "Bảo toàn vị thế", status: "HOLDING", color: "text-blue-400", desc: "Thị trường ổn định. Giữ hàng." },
            { id: 2, title: "Chốt lời mạnh", status: "TAKE PROFIT", color: "text-yellow-400", desc: "Hưng phấn cao. Thoát 50% hàng." },
            { id: 3, title: "Thoát hàng / Short", status: "EXIT STRATEGY", color: "text-red-400", desc: "Cực kỳ hưng phấn. Thoát hết." }
        ];

        function initPhases() {
            document.getElementById('phases-grid').innerHTML = phaseConfig.map(p => `
                <div id="phase-card-${p.id}" class="phase-card p-8 rounded-[2rem] bg-[#161b22]">
                    <span class="text-[10px] text-gray-500 uppercase font-black">Phase 0${p.id}</span>
                    <h3 class="font-bold text-xl text-white my-3">${p.title}</h3>
                    <p class="text-xs text-gray-400">${p.desc}</p>
                </div>
            `).join('');
        }

        // LẮNG NGHE DỮ LIỆU TỪ CÁC FILE CON
        window.addEventListener('message', function(event) {
            console.log("Dữ liệu nhận được:", event.data); // Để kiểm tra trong F12 Console
            
            if (event.data.type === 'WINTRACK_UPDATE') {
                marketData.rsi = event.data.rsi;
            }
            if (event.data.type === 'WINTRACK_FEAR_UPDATE') {
                marketData.fear = event.data.value;
            }

            // CHẠY LOGIC NGAY KHI CÓ BẤT KỲ DỮ LIỆU NÀO
            updateStrategyLogic();
        });

        function updateStrategyLogic() {
            const rsi = marketData.rsi || 50;  // Mặc định 50 nếu chưa có
            const fear = marketData.fear || 50; // Mặc định 50 nếu chưa có

            let target = 1; // Mặc định Phase 1
            if (fear <= 30 || rsi <= 38) target = 0;
            else if (fear >= 85) target = 3;
            else if (fear >= 78 || rsi >= 70) target = 2;

            activatePhase(target);
            
            // Cập nhật status bar
            const statusText = document.getElementById('system-status');
            statusText.textContent = `LIVE: RSI ${Math.round(rsi)} | F&G ${fear}`;
            statusText.className = "text-xs font-mono text-green-400";
            document.getElementById('status-dot').className = "w-3 h-3 bg-green-500 rounded-full animate-pulse";
        }

        function activatePhase(id) {
            if (currentPhaseId === id) return;
            currentPhaseId = id;
            
            // Reset cards
            phaseConfig.forEach((_, i) => {
                document.getElementById(`phase-card-${i}`).className = "phase-card p-8 rounded-[2rem] bg-[#161b22]";
            });

            // Active card
            const activeCard = document.getElementById(`phase-card-${id}`);
            activeCard.classList.add(id === 0 ? 'phase-card-accumulate' : 'phase-card-active');

            // Cập nhật text status
            const info = phaseConfig[id];
            const textEl = document.getElementById('current-phase-text');
            textEl.textContent = `PHASE 0${id} - ${info.status}`;
            textEl.className = `text-sm font-bold uppercase ${info.color}`;
        }

        window.onload = () => {
            initPhases();
            // Tự động chạy một lần để kiểm tra giao diện
            updateStrategyLogic();
            setInterval(() => {
                const mins = Math.floor((Date.now() - phaseStartTime) / 60000);
                document.getElementById('phase-duration').textContent = `${mins} phút`;
            }, 10000);
        };
    </script>
</body>
</html>
