<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinTrack 2026 | Profit Guardian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: #c9d1d9; }
        .phase-card { transition: all 0.5s ease; border: 1px solid #30363d; }
        .phase-card-active { border-color: #f2cc60 !important; background: rgba(242, 204, 96, 0.1) !important; transform: translateY(-5px); }
        .phase-card-accumulate { border-color: #3fb950 !important; background: rgba(63, 185, 80, 0.1) !important; transform: translateY(-5px); }
    </style>
</head>
<body class="min-h-screen p-4 lg:p-8">
    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10 pb-8 border-b border-[#30363d]">
        <div>
            <h1 class="text-5xl font-black text-white uppercase tracking-tighter">WinTrack <span class="text-[#f2cc60]">2026</span></h1>
            <p class="text-gray-400 text-sm mt-2">Hệ thống giám sát lợi nhuận v3.0</p>
        </div>
        <div class="mt-6 md:mt-0 flex items-center gap-4 bg-[#161b22] px-6 py-3 rounded-2xl border border-[#30363d]">
            <div class="flex flex-col items-end">
                <span class="text-[10px] text-gray-500 font-bold uppercase">System Status</span>
                <span id="system-status" class="text-xs font-mono text-yellow-400">SYNCING...</span>
            </div>
            <span id="status-dot" class="w-3 h-3 bg-yellow-500 rounded-full animate-pulse"></span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
            <div class="border border-[#30363d] rounded-3xl overflow-hidden h-[400px]"><iframe src="technical-analysis.html" class="w-full h-full border-none"></iframe></div>
            <div class="border border-[#30363d] rounded-3xl overflow-hidden h-[400px]"><iframe src="fear-greed.html" class="w-full h-full border-none"></iframe></div>
            <div class="border border-[#30363d] rounded-3xl overflow-hidden h-[400px]"><iframe src="https://s.tradingview.com/widgetembed/?symbol=CRYPTOCAP%3ABTC.D&theme=dark" class="w-full h-full border-none"></iframe></div>
            <div class="border border-[#30363d] rounded-3xl overflow-hidden h-[400px]"><iframe src="leverage-signals.html" class="w-full h-full border-none"></iframe></div>
        </div>

        <section>
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black text-white uppercase">KẾ HOẠCH HÀNH ĐỘNG</h2>
                <div id="current-phase-text" class="text-sm font-bold text-white bg-[#1c2128] px-4 py-2 rounded-xl border border-[#30363d]">WAITING DATA...</div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="phases-grid"></div>
        </section>
    </main>

    <script>
        let marketData = { rsi: null, fear: null };
        let currentPhaseId = -1;

        const phaseConfig = [
            { id: 0, title: "Tích lũy (GOM DẦN)", status: "ACCUMULATING", color: "text-emerald-400", desc: "RSI < 35 & Fear < 30. Cơ hội vàng." },
            { id: 1, title: "Bảo toàn vị thế", status: "HOLDING", color: "text-blue-400", desc: "Thị trường ổn định. Giữ danh mục." },
            { id: 2, title: "Chốt lời mạnh", status: "TAKE PROFIT", color: "text-yellow-400", desc: "Hưng phấn cao. Thoát 50% hàng." },
            { id: 3, title: "Thoát hàng / Short", status: "EXIT STRATEGY", color: "text-red-400", desc: "Cực kỳ hưng phấn. Thoát hết." }
        ];

        function initPhases() {
            document.getElementById('phases-grid').innerHTML = phaseConfig.map(p => `
                <div id="phase-card-${p.id}" class="phase-card p-8 rounded-[2rem] bg-[#161b22]">
                    <span class="text-[10px] text-gray-500 uppercase font-black">Phase 0${p.id}</span>
                    <h3 class="font-bold text-xl text-white my-3">${p.title}</h3>
                    <p class="text-xs text-gray-400">${p.desc}</p>
                </div>
            `).join('');
        }

        window.addEventListener('message', function(event) {
            if (event.data.type === 'WINTRACK_UPDATE') marketData.rsi = event.data.rsi;
            if (event.data.type === 'WINTRACK_FEAR_UPDATE') marketData.fear = event.data.value;
            updateStrategyLogic();
        });

        function updateStrategyLogic() {
            const rsi = marketData.rsi || 50;
            const fear = marketData.fear || 50;
            let target = 1;

            if (fear <= 30 || rsi <= 35) target = 0;
            else if (fear >= 85) target = 3;
            else if (fear >= 78 || rsi >= 70) target = 2;

            if (currentPhaseId !== target) {
                currentPhaseId = target;
                phaseConfig.forEach((_, i) => document.getElementById(`phase-card-${i}`).className = "phase-card p-8 rounded-[2rem] bg-[#161b22]");
                const card = document.getElementById(`phase-card-${target}`);
                card.classList.add(target === 0 ? 'phase-card-accumulate' : 'phase-card-active');
                
                const textEl = document.getElementById('current-phase-text');
                textEl.textContent = `PHASE 0${target} - ${phaseConfig[target].status}`;
                textEl.className = `text-sm font-bold uppercase px-4 py-2 rounded-xl border border-[#30363d] ${phaseConfig[target].color}`;
            }

            document.getElementById('system-status').textContent = `LIVE: RSI ${Math.round(rsi)} | F&G ${fear}`;
            document.getElementById('system-status').className = "text-xs font-mono text-green-400";
            document.getElementById('status-dot').className = "w-3 h-3 bg-green-500 rounded-full animate-pulse";
        }

        window.onload = () => {
            initPhases();
            setTimeout(updateStrategyLogic, 3000); // Tự kích hoạt sau 3s nếu iframe chậm
        };
    </script>
</body>
</html>
