<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Real-time Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: transparent; color: #c9d1d9; font-family: 'Inter', sans-serif; padding: 8px; margin: 0; overflow: hidden; }
        .card { 
            background: rgba(13, 17, 23, 0.98); border: 1px solid #30363d; border-radius: 12px; 
            padding: 16px; height: calc(100vh - 16px); display: flex; flex-direction: column;
        }
        .radar-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; position: relative; transition: background 0.5s; }
        .radar-dot::after {
            content: ""; position: absolute; width: 100%; height: 100%; border-radius: 50%;
            background: inherit; animation: pulse 2s infinite; opacity: 0.5;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(3); opacity: 0; } }
        .meter-bg { width: 100%; height: 6px; background: #21262d; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #meter-fill { height: 100%; width: 0%; transition: width 1.5s ease-in-out, background 1s; }
        .data-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #21262d; }
        .symbol-text { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #8b949e; }
        .alert-box { 
            margin-top: auto; padding: 10px; border-radius: 8px; font-size: 11px; font-weight: 800; 
            text-align: center; border: 1px solid #30363d; transition: all 0.5s;
        }
        .loading-text { animation: pulse 1.5s infinite; }
    </style>
</head>
<body>
    <div class="card">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="radar-dot bg-gray-500" id="status-dot"></div>
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Binance Live Funding</span>
            </div>
            <span class="text-[11px] text-gray-500 font-mono bg-[#161b22] px-2 py-1 rounded" id="clock">CONNECTING</span>
        </div>

        <div class="meter-bg"><div id="meter-fill"></div></div>
        <div id="list" class="flex-1"></div>
        <div id="alert" class="alert-box bg-[#0d1117] text-gray-500 uppercase">Đang đồng bộ dữ liệu...</div>
    </div>

    <script>
        const SYMBOLS = ['BTCUSDT', 'ETHUSDT', 'SOLUSDT', 'DOGEUSDT'];

        async function fetchData() {
            try {
                // Lấy dữ liệu Premium Index & Funding Rate từ Binance Futures API
                const response = await fetch('https://fapi.binance.com/fapi/v1/premiumIndex');
                const data = await response.json();
                
                // Lọc ra các đồng coin mình cần
                const filteredData = data.filter(item => SYMBOLS.includes(item.symbol));
                updateUI(filteredData);
            } catch (error) {
                console.error("Lỗi lấy dữ liệu:", error);
                document.getElementById('alert').innerText = "LỖI KẾT NỐI API";
            }
        }

        function updateUI(data) {
            const list = document.getElementById('list');
            const alert = document.getElementById('alert');
            const meter = document.getElementById('meter-fill');
            const dot = document.getElementById('status-dot');
            
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('vi-VN');
            
            let totalFunding = 0;
            let html = '';

            data.forEach(item => {
                const fundingRate = parseFloat(item.lastFundingRate);
                const fundingPercent = fundingRate * 100;
                totalFunding += Math.abs(fundingPercent);

                const colorClass = fundingPercent >= 0 ? 'text-green-500' : 'text-red-500';
                const icon = fundingPercent >= 0 ? '▲' : '▼';

                html += `
                    <div class="data-row">
                        <span class="symbol-text">${item.symbol}</span>
                        <span class="font-mono font-bold text-[13px] ${colorClass}">
                            ${icon} ${fundingPercent.toFixed(4)}%
                        </span>
                    </div>
                `;
            });

            list.innerHTML = html;

            // Tính mức độ rủi ro dựa trên tổng Funding Rate (0.1% làm mốc cao)
            const riskLevel = Math.min((totalFunding / 0.04) * 100, 100);
            meter.style.width = riskLevel + '%';

            if (riskLevel > 60) {
                meter.style.background = "#f85149";
                dot.className = "radar-dot bg-red-500";
                alert.style.borderColor = "#f85149";
                alert.style.color = "#f85149";
                alert.innerText = "⚠️ CẢNH BÁO: ĐÒN BẨY LONG/SHORT LỚN";
            } else {
                meter.style.background = "#238636";
                dot.className = "radar-dot bg-green-500";
                alert.style.borderColor = "#30363d";
                alert.style.color = "#8b949e";
                alert.innerText = "🛡️ THỊ TRƯỜNG ỔN ĐỊNH";
            }
        }

        // Cập nhật mỗi 10 giây (Binance cập nhật Funding Rate liên tục)
        setInterval(fetchData, 10000);
        fetchData();
    </script>
</body>
</html>
